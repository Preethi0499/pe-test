apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: crossplane-s3-bucket
  description: S3 Bucket provisioned by Crossplane on AWS
  annotations:
    backstage.io/kubernetes-id: my-crossplane-test-bucket-12345
  tags:
    - aws
    - s3
    - infrastructure
    - crossplane
spec:
  type: infrastructure
  lifecycle: production
  owner: platform-team
EOF

# --- backstage/backstage-values.yaml ---
cat > backstage/backstage-values.yaml << 'EOF'
backstage:
  image:
    registry: docker.io
    repository: roadiehq/community-backstage-image
    tag: latest

  extraEnvVars:
    - name: NODE_ENV
      value: development
    - name: APP_CONFIG_app_baseUrl
      value: "http://localhost:7007"
    - name: APP_CONFIG_backend_baseUrl
      value: "http://localhost:7007"
    - name: APP_CONFIG_backend_cors_origin
      value: "http://localhost:7007"
    - name: APP_CONFIG_backend_database_client
      value: pg
    - name: APP_CONFIG_backend_database_connection_host
      value: "backstage-postgresql"
    - name: APP_CONFIG_backend_database_connection_port
      value: "5432"
    - name: APP_CONFIG_backend_database_connection_user
      value: bn_backstage
    - name: APP_CONFIG_backend_database_connection_password
      valueFrom:
        secretKeyRef:
          name: backstage-postgresql
          key: password

  appConfig:
    app:
      title: My Developer Portal
      baseUrl: http://localhost:7007

    backend:
      baseUrl: http://localhost:7007
      cors:
        origin: http://localhost:7007

    catalog:
      rules:
        - allow: [Component, System, API, Resource, Location]
      locations:
        - type: url
          target: https://github.com/Preethi0499/pe-test/blob/main/backstage/catalog-info.yaml

postgresql:
  enabled: true
  auth:
    username: bn_backstage
    password: backstage
    database: backstage
